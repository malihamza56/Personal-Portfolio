<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>signup"></title>
    <link rel="stylesheet" href="logina_style.css" />
  </head>
  <body>
    <section>
      <div>
        <form action="action.php">
          <h2>Sign In</h2>
          <p>Enter your credentials to access your account</p>
          <label for="signin">Enter Email/Username</h5>
          <div>
            <input
              type="text"
              id="signin"
              placeholder="example@gmail.com or username"
              name="email"
              required
            />
          </div>
          <label for="password">Enter Password (6-11)
          <div>
            <input
              type="password"
              placeholder="Enter password"
              name="password"
              minlength="6"
              maxlength="11"
              required
            />
          </div>
          <br />
          <div></label>
            <button type="submit">login</button>
          </div>
        </form>
      </div>
    </section>
  </body>
</html>
